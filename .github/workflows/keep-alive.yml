name: Keep Render Awake

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping API (with retry)
        run: |
          for i in 1 2 3; do
            echo "Attempt $i..."
            if curl --max-time 300 -s -o /dev/null -w "%{http_code}" https://t20-oracle-api.onrender.com/ | grep -q "200"; then
              echo "Server is awake!"
              exit 0
            fi
            echo "Server not ready, waiting 30s..."
            sleep 30
          done
          echo "Server pinged (may still be waking up). Marking as success."
          exit 0
