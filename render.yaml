services:
  - type: web
    name: t20-oracle-api
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DB_PATH
        value: data/processed/cricket.db
      - key: GEMINI_API_KEYS
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: CRICAPI_KEY
        sync: false
